<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Warrior Arena</title>
    <style>
      /* ── Reset & Fullscreen ── */
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #game-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      /* ── HUD Overlay ── */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
        font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
        color: #ddd;
      }

      /* Health & Stamina — top-left */
      #bars {
        position: absolute;
        top: 8px;
        left: 8px;
        display: flex;
        flex-direction: column;
        gap: 3px;
        width: 110px;
      }
      .bar-row {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .bar-label {
        font-size: 6px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #aaa;
        width: 11px;
        flex-shrink: 0;
      }
      .bar-track {
        flex: 1;
        height: 5px;
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 1px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.15s ease;
      }
      #health-fill {
        background: linear-gradient(90deg, #7b0000, #c0392b);
        width: 100%;
      }
      #stamina-fill {
        background: linear-gradient(90deg, #005544, #1abc9c);
        width: 100%;
      }

      /* Wave counter — top-center */
      #wave-counter {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        font-weight: bold;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        text-shadow: 0 0 6px rgba(255,100,50,0.7), 0 1px 2px rgba(0,0,0,0.9);
        color: #e8d5a0;
        white-space: nowrap;
      }

      /* Kill counter — top-right */
      #kill-counter {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        align-items: center;
        gap: 3px;
        font-size: 9px;
        text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        color: #ccc;
      }
      #kill-counter .skull { font-size: 10px; }
      #kill-count {
        font-size: 10px;
        font-weight: bold;
        color: #e8d5a0;
      }

      /* Style meter — right side below kill counter */
      #style-meter {
        position: absolute;
        top: 30px;
        right: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
      }
      #style-label {
        font-size: 5px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #777;
      }
      #style-rank {
        font-size: 26px;
        font-weight: bold;
        line-height: 1;
        color: #888;
        transition: color 0.2s ease, text-shadow 0.2s ease;
      }

      /* ── Mobile Touch Controls ── */
      #mobile-controls {
        display: none;
        pointer-events: auto;
      }
      /* Large invisible capture zone — left 45% of screen, bottom 60% */
      #joystick-zone {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 45%;
        height: 60%;
        pointer-events: auto;
        touch-action: none;
      }
      /* Floating base — appears at touch-start position, hidden until touched */
      #joystick-base {
        position: absolute;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: rgba(255,255,255,0.07);
        border: 2px solid rgba(255,255,255,0.22);
        display: none;
        pointer-events: none;
        transform: translate(-50%, -50%);
      }
      #joystick-knob {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.45), rgba(255,255,255,0.18));
        border: 2px solid rgba(255,255,255,0.50);
        position: absolute;
        pointer-events: none;
        transform: translate(-50%, -50%);
        left: 50%;
        top: 50%;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      }
      #attack-btn {
        position: absolute;
        bottom: 28px;
        right: 24px;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: radial-gradient(circle at 40% 35%, rgba(220,50,50,0.7), rgba(140,20,20,0.6));
        border: 2px solid rgba(255,90,90,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        user-select: none;
        -webkit-user-select: none;
        color: #fff;
        text-shadow: 0 0 6px rgba(255,80,80,0.9);
        pointer-events: auto;
        touch-action: none;
        box-shadow: 0 0 12px rgba(200,40,40,0.5), inset 0 1px 0 rgba(255,150,150,0.3);
      }

      @media (pointer: coarse) {
        #mobile-controls { display: block; }
      }
    </style>
    <script type="module" crossorigin src="/Warrior-Arena/assets/index-BHg8Ze_h.js"></script>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <!-- HUD Overlay -->
    <div id="hud">
      <div id="bars">
        <div class="bar-row">
          <span class="bar-label">HP</span>
          <div class="bar-track"><div class="bar-fill" id="health-fill"></div></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">ST</span>
          <div class="bar-track"><div class="bar-fill" id="stamina-fill"></div></div>
        </div>
      </div>

      <div id="wave-counter">Wave <span id="wave-num">1</span></div>

      <div id="kill-counter">
        <span class="skull">💀</span>
        <span id="kill-count">0</span>
      </div>

      <div id="style-meter">
        <div id="style-label">Style</div>
        <div id="style-rank">D</div>
      </div>

      <!-- Mobile Controls -->
      <div id="mobile-controls">
        <div id="joystick-zone">
          <div id="joystick-base">
            <div id="joystick-knob"></div>
          </div>
        </div>
        <div id="attack-btn">⚔️</div>
      </div>
    </div>

  </body>
</html>
